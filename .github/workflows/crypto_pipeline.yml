name: Crypto Market Data Pipeline
permissions:
  contents: write
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # updated

      - name: Setup Python
        uses: actions/setup-python@v5 # updated
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run data pipeline
        run: |
          python main.py

      - name: Commit updated data and charts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated daily crypto data update" || echo "No changes to commit"
          git push
